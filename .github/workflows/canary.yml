name: 🐤 Canary Release

on:
  workflow_dispatch:

concurrency:
  group: canary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  canary:
    name: 🐤 Publish canary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏷️ Stamp canary version
        run: |
          SHA=$(git rev-parse --short HEAD)
          BASE=$(node -p "require('./package.json').version")
          CANARY="${BASE}-canary.${SHA}"
          npm version "${CANARY}" --no-git-tag-version
          echo "CANARY_VERSION=${CANARY}" >> $GITHUB_ENV

      - name: 🔨 Build package
        run: npm run build:package

      - name: 📦 Publish to npm (canary)
        run: npm publish --tag canary --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 🟢 Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@opositatest'

      - name: 📦 Publish to GitHub Packages (canary)
        run: npm publish --registry https://npm.pkg.github.com --tag canary
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔗 Canary links
        run: |
          echo "## 🐤 Canary published: ${CANARY_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### npm" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "npm install @opositatest/markdown-text-editor@${CANARY_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### jsDelivr CDN" >> $GITHUB_STEP_SUMMARY
          echo '```html' >> $GITHUB_STEP_SUMMARY
          echo "<link rel=\"stylesheet\" href=\"https://cdn.jsdelivr.net/npm/@opositatest/markdown-text-editor@${CANARY_VERSION}/dist/editor.css\" />" >> $GITHUB_STEP_SUMMARY
          echo "<script type=\"module\" src=\"https://cdn.jsdelivr.net/npm/@opositatest/markdown-text-editor@${CANARY_VERSION}/dist/editor.js\"></script>" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### GitHub Packages" >> $GITHUB_STEP_SUMMARY
          echo "https://github.com/opositatest/opo-markdown-input/pkgs/npm/markdown-text-editor" >> $GITHUB_STEP_SUMMARY
