<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Component Test</title>
  </head>
  <body>
    <div class="test-page">
      <header class="test-header">
        <p class="eyebrow">Plain HTML Host</p>
        <h1>Prueba del Web Component</h1>
        <p class="lede">
          Un campo obligatorio, otro opcional y un tercero precargado para validar escritura, bloqueo nativo y payload enviado.
        </p>
      </header>

      <main class="test-layout single-column-layout">
        <section class="panel test-panel">
          <form id="editor-test-form" class="html-form simple-form">
            <label class="field-group">
              <span>Campo 1 (required)</span>
              <markdown-text-editor
                id="editor-first"
                name="fieldOne"
                placeholder="Escribe lo que quieras..."
                required
              ></markdown-text-editor>
            </label>

            <label class="field-group">
              <span>Campo 2 (optional)</span>
              <markdown-text-editor
                id="editor-second"
                name="fieldTwo"
                placeholder="Escribe lo que quieras..."
              ></markdown-text-editor>
            </label>

            <label class="field-group">
              <span>Campo 3 (prefilled demo)</span>
              <markdown-text-editor
                id="editor-third"
                name="fieldThree"
                value="## Nota tecnica&#10;&#10;Este campo viene con contenido de ejemplo para probar integracion realista en Sonata.&#10;&#10;- Texto enriquecido en Markdown&#10;- Lista con varios items&#10;- Bloques matematicos renderizados&#10;&#10;$$&#10;E = mc^2&#10;$$&#10;&#10;$$&#10;\int_0^1 x^2\,dx = \frac{1}{3}&#10;$$&#10;&#10;Fin de la prueba."
              ></markdown-text-editor>
            </label>

            <p>
              Deja vacio el Campo 1 y pulsa "Mostrar output" para comprobar la validacion nativa.
            </p>

            <div class="action-row">
              <button id="submit-form" type="submit">Mostrar output</button>
            </div>
          </form>
        </section>

        <section class="panel compact-panel output-panel">
          <h2>Output</h2>
          <pre id="form-payload">{}</pre>
        </section>
      </main>
    </div>

    <script type="module" src="/src/web-component-test.ts"></script>
  </body>
</html>
